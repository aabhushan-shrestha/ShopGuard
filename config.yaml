camera:
  source: 0                    # integer index (USB) or RTSP URL string
  width: 1280
  height: 720
  fps_cap: 30
  reconnect_attempts: 5
  reconnect_delay: 2.0

model:
  weights: "yolov8n.pt"
  confidence: 0.5
  classes: [0]
  device: "auto"
  img_size: 640

display:
  show_window: false
  window_name: "ShopGuard - Person Detection"
  show_fps: true
  show_count: true
  bbox_color: [0, 255, 0]
  bbox_thickness: 2
  font_scale: 0.6

zones:
  - name: "entrance"
    points: [[100,400], [500,400], [500,700], [100,700]]
    max_occupancy: 5
    color: [0, 255, 255]
  - name: "restricted"
    points: [[600,100], [900,100], [900,400], [600,400]]
    max_occupancy: 1
    restricted: true
    color: [32, 32, 255]

alerts:
  enabled: true
  cooldown_seconds: 30
  handlers:
    - type: "console"
    - type: "file"
      path: "logs/alerts.log"
    - type: "sound"
      frequency: 1000
      duration_ms: 300
    - type: "telegram"
      enabled: false      # set to true; provide token/chat_id here or via .env
      # token: ""         # or set TELEGRAM_BOT_TOKEN env var
      # chat_id: ""       # or set TELEGRAM_CHAT_ID env var

cloud:
  enabled: true            # set to true once Supabase is configured
  # url: ""                 # or set SUPABASE_URL env var
  # anon_key: ""            # or set SUPABASE_ANON_KEY env var
  heartbeat_interval: 60    # seconds between heartbeats
  storage_bucket: "alert-frames"
  # On first launch with cloud.enabled: true, a browser window opens for
  # Google login.  The session is saved to ~/.shopguard/session.json and
  # reused automatically on subsequent launches.

tracker:
  iou_threshold: 0.3
  max_lost: 30
  max_history: 300   # centroid history length per person (~10s at 30fps)

behavior:
  loiter_frames: 150   # frames before flagging loitering (~5s at 30fps)
  pace_reversals: 4    # direction changes required to flag pacing
  pace_window: 90      # frames to look back when checking for pacing

dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 8080
  max_alerts: 100
  auth:
    username: "admin"
    password: "shopguard"   # change before deploying

recorder:
  enabled: true
  clips_dir: "clips"
  pre_seconds: 10       # seconds of footage to keep before the alert
  post_seconds: 10      # seconds to record after the alert fires
  fps: 15               # write FPS for saved clips (sub-sampled from camera)
  buffer_resize: 0.5    # downscale stored frames (0.5 = half res, saves ~75% RAM)
  save_snapshot: true   # save a JPEG at the moment the alert fires

logging:
  level: "INFO"
  file: "logs/shopguard.log"
  max_bytes: 5242880
  backup_count: 3
  format: "%(asctime)s | %(name)s | %(levelname)s | %(message)s"
