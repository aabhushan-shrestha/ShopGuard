<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ShopGuard Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    /* ── THEME VARIABLES ─────────────────────────────────────────────────── */
    :root[data-theme="dark"] {
      --bg-base: #111117;
      --bg-surface: #1a1a24;
      --bg-hover: #22222f;
      --bg-active: #2a2a3a;
      --border: #2e2e40;
      --text-primary: #f0f0f0;
      --text-secondary: #9090a8;
      --text-muted: #5a5a72;
      --accent: #5b6ef5;
      --accent-hover: #4a5de0;
      --danger: #e05555;
      --success: #3dbf7a;
      --warning: #e0a030;
      --badge-bg: #2a2a3a;
    }
    :root[data-theme="light"] {
      --bg-base: #f5f5f7;
      --bg-surface: #ffffff;
      --bg-hover: #f0f0f4;
      --bg-active: #e8e8f0;
      --border: #dddde8;
      --text-primary: #111117;
      --text-secondary: #44445a;
      --text-muted: #88889a;
      --accent: #4a5de0;
      --accent-hover: #3a4dcf;
      --danger: #d04040;
      --success: #2da060;
      --warning: #c07020;
      --badge-bg: #ebebf5;
    }

    /* ── BASE ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: var(--bg-base);
      color: var(--text-primary);
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: background 0.2s, color 0.2s;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── NAVBAR ───────────────────────────────────────────────────────────── */
    .sg-navbar {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .sg-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sg-logo-icon { font-size: 1.25rem; }
    .sg-logo-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
    }
    .sg-logo-sub {
      font-size: 0.7rem;
      color: var(--text-muted);
      line-height: 1;
    }
    .sg-navbar-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .sg-theme-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 1rem;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .sg-theme-toggle:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    .sg-live-status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    .sg-live-dot {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    /* ── TAB BAR ─────────────────────────────────────────────────────────── */
    .sg-tabbar {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .sg-tab {
      background: none;
      border: none;
      border-radius: 20px;
      padding: 6px 14px;
      margin: 7px 0;
      font-size: 0.85rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .sg-tab:hover { background: var(--bg-hover); color: var(--text-primary); }
    .sg-tab.active {
      background: var(--accent);
      color: #fff;
    }

    /* ── CONTENT ─────────────────────────────────────────────────────────── */
    .sg-content { padding: 20px; }

    /* ── LIVE TAB ────────────────────────────────────────────────────────── */
    .sg-feed-wrap { text-align: center; }
    .sg-feed-wrap img {
      max-height: 82vh;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
    }
    .sg-camera-bar {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
      margin-top: 12px;
    }
    .sg-camera-bar .cam-label {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .sg-camera-bar select {
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      padding: 4px 8px;
      font-size: 0.82rem;
    }
    .sg-camera-bar select:focus { outline: 2px solid var(--accent); border-color: transparent; }
    .sg-btn-connect {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #fff;
      padding: 5px 12px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .sg-btn-connect:hover { background: var(--accent-hover); }
    #camera-status { font-size: 0.78rem; color: var(--text-muted); }

    /* ── ALERTS TAB ──────────────────────────────────────────────────────── */
    .sg-alerts-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .sg-alerts-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sg-count-badge {
      background: var(--badge-bg);
      color: var(--text-secondary);
      border-radius: 10px;
      padding: 1px 8px;
      font-size: 0.72rem;
    }
    .sg-btn-ghost {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      padding: 5px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .sg-btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }
    .sg-alert-list { display: flex; flex-direction: column; gap: 6px; }
    .sg-alert-row {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      border-left: 4px solid var(--border);
    }
    .sg-alert-row.level-critical { border-left-color: var(--danger); }
    .sg-alert-row.level-warning  { border-left-color: var(--warning); }
    .sg-alert-row.level-info     { border-left-color: var(--accent); }
    .sg-alert-time {
      font-family: monospace;
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
      min-width: 75px;
    }
    .sg-level-badge {
      font-size: 0.68rem;
      font-weight: 700;
      border-radius: 20px;
      padding: 2px 9px;
      white-space: nowrap;
    }
    .sg-level-badge.critical {
      background: rgba(224,85,85,0.15);
      color: var(--danger);
    }
    .sg-level-badge.warning {
      background: rgba(224,160,48,0.15);
      color: var(--warning);
    }
    .sg-level-badge.info {
      background: rgba(91,110,245,0.15);
      color: var(--accent);
    }
    .sg-level-badge.secondary {
      background: var(--badge-bg);
      color: var(--text-secondary);
    }
    .sg-alert-type { font-size: 0.8rem; color: var(--text-secondary); white-space: nowrap; }
    .sg-alert-msg  { font-size: 0.85rem; color: var(--text-primary); flex: 1; }
    .sg-chip {
      background: var(--badge-bg);
      color: var(--text-secondary);
      border-radius: 20px;
      padding: 2px 9px;
      font-size: 0.72rem;
      white-space: nowrap;
    }
    .sg-empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 0;
      color: var(--text-muted);
      gap: 8px;
    }
    .sg-empty-state .sg-empty-icon { font-size: 2rem; }
    .sg-empty-state p { margin: 0; font-size: 0.85rem; }

    /* ── CLIPS TAB ───────────────────────────────────────────────────────── */
    .clip-item {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .clip-item:hover { background: var(--bg-hover); }
    .clip-item.active { border-left: 3px solid var(--accent); }
    .clip-item .clip-title { font-size: 0.82rem; font-weight: 600; color: var(--text-primary); }
    .clip-item .clip-type  { font-size: 0.73rem; color: var(--text-muted); }
    #clip-player {
      background: #000;
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .clips-col-label { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 10px; font-weight: 600; }

    /* ── ZONES TAB ───────────────────────────────────────────────────────── */
    #zone-canvas {
      cursor: crosshair;
      border: 1px solid var(--border);
      border-radius: 8px;
      display: block;
      max-width: 100%;
    }
    .sg-btn-refresh {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      padding: 4px 10px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .sg-btn-refresh:hover { background: var(--bg-hover); color: var(--text-primary); }
    .point-counter {
      display: inline-block;
      background: var(--badge-bg);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 12px;
      font-size: 0.78rem;
      margin-left: 6px;
    }
    .sg-zone-hint { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 8px; }
    .sg-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .sg-card-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 14px;
    }
    .sg-form-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
      display: block;
      margin-bottom: 5px;
    }
    .sg-input {
      width: 100%;
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      padding: 6px 10px;
      font-size: 0.83rem;
      transition: border-color 0.15s;
    }
    .sg-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(91,110,245,0.18); }
    .sg-input::placeholder { color: var(--text-muted); }
    /* Custom checkbox */
    .sg-check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0;
    }
    .sg-check-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .sg-check-label {
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
    }
    .sg-check-label .check-sub { color: var(--text-muted); font-weight: 400; }
    .sg-btn-finish {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #fff;
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .sg-btn-finish:hover { background: var(--accent-hover); }
    .sg-btn-cancel {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .sg-btn-cancel:hover { background: var(--bg-hover); color: var(--text-primary); }
    #zone-status { font-size: 0.78rem; color: var(--text-muted); margin-top: 8px; }
    #zone-status.text-danger { color: var(--danger); }
    .sg-btn-save-all {
      background: var(--success);
      border: none;
      border-radius: 6px;
      color: #fff;
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .sg-btn-save-all:hover { opacity: 0.85; }
    /* Zone list items */
    .zone-item {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 3px solid transparent;
    }
    .zone-item .zone-name  { font-size: 0.83rem; font-weight: 600; color: var(--text-primary); }
    .zone-item .zone-badge {
      background: var(--badge-bg);
      color: var(--text-secondary);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 0.65rem;
      font-weight: 700;
    }
    .zone-item .zone-badge.restricted { background: rgba(224,85,85,0.15); color: var(--danger); }
    .zone-item .zone-occ  { font-size: 0.7rem; color: var(--text-muted); }
    .zone-item .zone-btns button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-secondary);
      padding: 1px 7px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: background 0.12s;
    }
    .zone-item .zone-btns button:hover { background: var(--bg-hover); color: var(--text-primary); }
    .zone-item .zone-btns button.del:hover { background: rgba(224,85,85,0.12); color: var(--danger); border-color: var(--danger); }
    .zone-empty-state {
      background: var(--bg-base);
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 2rem 1rem;
      text-align: center;
      color: var(--text-muted);
    }
    .zone-empty-state .zone-empty-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .zone-count-badge {
      background: var(--badge-bg);
      color: var(--text-secondary);
      border-radius: 10px;
      padding: 1px 8px;
      font-size: 0.72rem;
    }

    /* ── MODAL ───────────────────────────────────────────────────────────── */
    .modal-content {
      background: var(--bg-surface) !important;
      border: 1px solid var(--border) !important;
      color: var(--text-primary) !important;
    }
    .modal-header { border-bottom-color: var(--border) !important; }
    .modal-footer { border-top-color: var(--border) !important; }
    .modal-title  { color: var(--text-primary) !important; font-size: 0.95rem; }
    .btn-close    { filter: invert(0.7); }
    [data-theme="dark"] .btn-close { filter: invert(1) grayscale(1); }
    .modal-label  { font-size: 0.78rem; color: var(--text-secondary); display: block; margin-bottom: 5px; }
    .modal .sg-btn-ghost { margin-right: 4px; }
  </style>
</head>
<body>

<!-- ── NAVBAR ─────────────────────────────────────────────────────────────── -->
<nav class="sg-navbar">
  <div class="sg-logo">
    <span class="sg-logo-icon">&#128737;</span>
    <div>
      <div class="sg-logo-name">ShopGuard</div>
      <div class="sg-logo-sub">Retail Security</div>
    </div>
  </div>
  <div class="sg-navbar-right">
    <button class="sg-theme-toggle" id="theme-toggle" title="Toggle theme" onclick="toggleTheme()">🌙</button>
    <div class="sg-live-status">
      <div class="sg-live-dot"></div>
      <span>Live</span>
    </div>
  </div>
</nav>

<!-- ── TAB BAR ────────────────────────────────────────────────────────────── -->
<div class="sg-tabbar">
  <button class="sg-tab active" data-tab="live">&#128249; Live</button>
  <button class="sg-tab" data-tab="alerts">&#128680; Alerts</button>
  <button class="sg-tab" data-tab="clips">&#127916; Clips</button>
  <button class="sg-tab" data-tab="zones">&#128506; Zones</button>
</div>

<div class="sg-content">

  <!-- ── LIVE ────────────────────────────────────────────────────────────── -->
  <div id="tab-live" class="tab-pane">
    <div class="sg-feed-wrap">
      <img src="/video_feed" class="img-fluid" alt="Live feed">
      <div>
        <div id="camera-bar" class="sg-camera-bar">
          <span class="cam-label">Camera:</span>
          <select id="camera-select">
            <option>Loading...</option>
          </select>
          <button class="sg-btn-connect" onclick="switchCamera()">Connect</button>
          <button class="sg-btn-connect" style="background:var(--text-muted);" onclick="toggleRtspForm()">+ RTSP</button>
          <span id="camera-status"></span>
        </div>
        <div id="rtsp-form" style="display:none;margin-top:8px;">
          <div class="sg-camera-bar" style="flex-wrap:wrap;">
            <input id="rtsp-name" type="text" placeholder="Camera name" style="background:var(--bg-base);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);padding:4px 8px;font-size:0.82rem;">
            <input id="rtsp-url" type="text" placeholder="rtsp://192.168.1.x:8080/..." style="background:var(--bg-base);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);padding:4px 8px;font-size:0.82rem;min-width:260px;">
            <button class="sg-btn-connect" onclick="addRtspCamera()">Add</button>
            <button class="sg-btn-connect" style="background:#dc3545;" id="rtsp-remove-btn" onclick="removeRtspCamera()" disabled>Remove Selected</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── ALERTS ──────────────────────────────────────────────────────────── -->
  <div id="tab-alerts" class="tab-pane d-none">
    <div class="sg-alerts-header">
      <div class="sg-alerts-title">
        Recent Alerts
        <span id="alert-count" class="sg-count-badge">0</span>
      </div>
      <button class="sg-btn-ghost" onclick="loadAlerts()">&#8635; Refresh</button>
    </div>
    <div id="alerts-body" class="sg-alert-list">
      <div class="sg-empty-state">
        <div class="sg-empty-icon">&#128680;</div>
        <p>Loading&hellip;</p>
      </div>
    </div>
  </div>

  <!-- ── CLIPS ───────────────────────────────────────────────────────────── -->
  <div id="tab-clips" class="tab-pane d-none">
    <div class="row g-3">
      <div class="col-md-3">
        <div class="clips-col-label">Saved Clips</div>
        <div id="clips-list" style="max-height:80vh; overflow-y:auto;"></div>
      </div>
      <div class="col-md-9">
        <div id="clip-viewer" class="d-none">
          <video id="clip-player" controls class="w-100 mb-2" style="max-height:60vh;"></video>
          <img id="clip-snapshot" class="img-fluid rounded d-none" style="max-height:40vh;" alt="Snapshot">
        </div>
        <div id="clips-empty" class="sg-empty-state">
          <div class="sg-empty-icon">&#127916;</div>
          <p>Select a clip to play</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ── ZONES ───────────────────────────────────────────────────────────── -->
  <div id="tab-zones" class="tab-pane d-none">
    <div class="row g-3">
      <div class="col-md-8">
        <p class="sg-zone-hint">
          Click to place points &nbsp;&#8226;&nbsp; Double-click to finish zone &nbsp;&#8226;&nbsp; Esc to cancel
        </p>
        <canvas id="zone-canvas"></canvas>
        <div class="mt-2 d-flex align-items-center">
          <button class="sg-btn-refresh" onclick="refreshFrame()">&#8635; Refresh Frame</button>
          <span id="point-counter" class="point-counter">Points placed: 0</span>
        </div>
      </div>
      <div class="col-md-4">
        <div class="sg-card">
          <div class="sg-card-title">New Zone</div>
          <label class="sg-form-label" for="zone-name">Zone Name</label>
          <input id="zone-name" class="sg-input mb-2" placeholder="e.g. exit, cashier">
          <div class="sg-check-row">
            <input type="checkbox" id="zone-restricted">
            <label class="sg-check-label" for="zone-restricted">
              Restricted <span class="check-sub">(alerts on entry)</span>
            </label>
          </div>
          <div class="d-flex gap-2 mt-2">
            <button class="sg-btn-finish" onclick="finishZone()">&#10003; Finish Zone</button>
            <button class="sg-btn-cancel" onclick="cancelZone()">&#10005; Cancel</button>
          </div>
          <p id="zone-status" class="mb-0"></p>
        </div>
        <div class="sg-card">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="sg-card-title mb-0 d-flex align-items-center gap-2">
              Defined Zones
              <span id="zone-count-badge" class="zone-count-badge">0</span>
            </div>
            <button class="sg-btn-save-all" onclick="saveZones()">&#128190; Save All</button>
          </div>
          <div id="zone-camera-chip" style="font-size:0.78rem;color:var(--text-muted);margin-bottom:8px;">&#128247; Camera 0 zones</div>
          <div id="zones-list"></div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /sg-content -->

<!-- ── ZONE EDIT MODAL ──────────────────────────────────────────────────── -->
<div class="modal fade" id="editZoneModal" tabindex="-1" aria-labelledby="editZoneModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header py-2">
        <h6 class="modal-title mb-0" id="editZoneModalLabel">Edit Zone</h6>
        <button type="button" class="btn-close btn-sm" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-zone-index">
        <label class="modal-label" for="edit-zone-name">Zone Name</label>
        <input id="edit-zone-name" class="sg-input mb-3" placeholder="Zone name">
        <div class="sg-check-row">
          <input type="checkbox" id="edit-zone-restricted">
          <label class="sg-check-label" for="edit-zone-restricted">
            Restricted <span class="check-sub">(alerts on entry)</span>
          </label>
        </div>
      </div>
      <div class="modal-footer py-2">
        <button type="button" class="sg-btn-cancel" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="sg-btn-finish" onclick="saveEditZone()">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── THEME ──────────────────────────────────────────────────────────────────
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('theme-toggle').textContent = theme === 'dark' ? '🌙' : '☀️';
}
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  localStorage.setItem('sg-theme', next);
  applyTheme(next);
}
(function() {
  const saved = localStorage.getItem('sg-theme');
  if (saved) applyTheme(saved);
})();

// ── TAB SWITCHING ──────────────────────────────────────────────────────────
document.querySelectorAll('[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('d-none'));
    document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + btn.dataset.tab).classList.remove('d-none');
    btn.classList.add('active');
    if (btn.dataset.tab === 'alerts') loadAlerts();
    if (btn.dataset.tab === 'clips')  loadClips();
    if (btn.dataset.tab === 'zones')  loadZoneEditor();
    if (btn.dataset.tab === 'live')   loadCameras();
  });
});

// ── ALERTS ─────────────────────────────────────────────────────────────────
function loadAlerts() {
  fetch('/api/alerts').then(r => r.json()).then(alerts => {
    document.getElementById('alert-count').textContent = alerts.length;
    const container = document.getElementById('alerts-body');
    if (!alerts.length) {
      container.innerHTML = '<div class="sg-empty-state"><div class="sg-empty-icon">&#128680;</div><p>No alerts yet</p></div>';
      return;
    }
    const levelClass = l => ({critical:'critical', warning:'warning', info:'info'}[l] || 'secondary');
    container.innerHTML = alerts.map(a => {
      const t = new Date(a.timestamp * 1000).toLocaleTimeString();
      const lc = levelClass(a.level);
      const zone   = a.zone_name ? `<span class="sg-chip">${a.zone_name}</span>` : `<span style="color:var(--text-muted)">—</span>`;
      const person = (a.person_id !== null && a.person_id !== undefined) ? `<span class="sg-chip">${a.person_id}</span>` : `<span style="color:var(--text-muted)">—</span>`;
      return `<div class="sg-alert-row level-${a.level}">
        <span class="sg-alert-time">${t}</span>
        <span class="sg-level-badge ${lc}">${a.level.toUpperCase()}</span>
        <span class="sg-alert-type">${a.alert_type}</span>
        <span class="sg-alert-msg">${a.message}</span>
        ${zone}${person}
      </div>`;
    }).join('');
  }).catch(() => {});
}
setInterval(() => {
  if (!document.getElementById('tab-alerts').classList.contains('d-none')) loadAlerts();
}, 5000);

// ── CLIPS ──────────────────────────────────────────────────────────────────
function loadClips() {
  fetch('/api/clips').then(r => r.json()).then(clips => {
    const el = document.getElementById('clips-list');
    if (!clips.length) {
      el.innerHTML = '<p style="font-size:0.82rem;color:var(--text-muted)">No clips saved yet.</p>';
      return;
    }
    el.innerHTML = clips.map(c => {
      const parts = c.stem.split('_');
      const date = parts[0] || '';
      const timeStr = parts[1] || '';
      const type = parts.slice(2).join('_') || '';
      const label = `${date.slice(0,4)}-${date.slice(4,6)}-${date.slice(6,8)} ${timeStr.slice(0,2)}:${timeStr.slice(2,4)}:${timeStr.slice(4,6)}`;
      return `<div class="clip-item" id="clip-${c.stem}" onclick="playClip('${c.name}','${c.stem}',${c.has_snapshot})">
        <div class="clip-title text-truncate">${label}</div>
        <div class="clip-type">${type}</div>
      </div>`;
    }).join('');
  }).catch(() => {});
}

function playClip(name, stem, hasSnapshot) {
  document.querySelectorAll('.clip-item').forEach(e => e.classList.remove('active'));
  const item = document.getElementById('clip-' + stem);
  if (item) item.classList.add('active');

  const player = document.getElementById('clip-player');
  const snap   = document.getElementById('clip-snapshot');
  const viewer = document.getElementById('clip-viewer');
  const empty  = document.getElementById('clips-empty');

  viewer.classList.remove('d-none');
  empty.classList.add('d-none');
  player.src = '/clips/' + name;
  player.play().catch(() => {});

  if (hasSnapshot) {
    snap.src = '/clips/' + stem + '_snapshot.jpg';
    snap.classList.remove('d-none');
  } else {
    snap.classList.add('d-none');
  }
}

// ── ZONE EDITOR ────────────────────────────────────────────────────────────
let zones = [];
let currentPts = [];
let mousePos = null;
const ZONE_COLORS = ['#00e5ff','#ff1744','#00e676','#ffea00','#ff6d00','#d500f9'];

function loadZoneEditor() {
  refreshFrame();
  fetch('/api/zones').then(r => r.json()).then(data => {
    zones = data || [];
    updateZonesList();
  }).catch(() => {});
}

function refreshFrame() {
  const canvas = document.getElementById('zone-canvas');
  const img = new Image();
  img.onload = () => {
    canvas.width  = img.naturalWidth;
    canvas.height = img.naturalHeight;
    canvas._bg = img;
    fetch('/api/zones').then(r => r.json()).then(data => {
      zones = data || [];
      redraw();
    }).catch(() => { zones = []; redraw(); });
  };
  img.onerror = () => setStatus('Could not load frame — is detection running?', true);
  img.src = '/api/frame?' + Date.now();
}

function redraw() {
  const canvas = document.getElementById('zone-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (canvas._bg) ctx.drawImage(canvas._bg, 0, 0);

  // Draw saved zones
  zones.forEach((z, i) => {
    if (!z.points || z.points.length < 2) return;
    const hex = ZONE_COLORS[i % ZONE_COLORS.length];
    ctx.beginPath();
    ctx.moveTo(z.points[0][0], z.points[0][1]);
    z.points.slice(1).forEach(p => ctx.lineTo(p[0], p[1]));
    ctx.closePath();
    ctx.fillStyle = hex + '40';   // 25% opacity fill
    ctx.fill();
    ctx.strokeStyle = hex;
    ctx.lineWidth = 2;
    ctx.stroke();
    // Label at centroid
    const cx = z.points.reduce((s, p) => s + p[0], 0) / z.points.length;
    const cy = z.points.reduce((s, p) => s + p[1], 0) / z.points.length;
    ctx.font = 'bold 13px sans-serif';
    ctx.fillStyle = '#000';
    ctx.fillText((z.restricted ? '\uD83D\uDD12 ' : '') + z.name, cx - 20 + 1, cy + 1);
    ctx.fillStyle = '#fff';
    ctx.fillText((z.restricted ? '\uD83D\uDD12 ' : '') + z.name, cx - 20, cy);
  });

  // Draw in-progress polygon
  const counter = document.getElementById('point-counter');
  if (counter) counter.textContent = 'Points placed: ' + currentPts.length;

  if (currentPts.length > 0) {
    const pts = mousePos ? [...currentPts, mousePos] : currentPts;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 4]);
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    pts.slice(1).forEach(p => ctx.lineTo(p[0], p[1]));
    ctx.stroke();
    ctx.setLineDash([]);
    currentPts.forEach((p, i) => {
      ctx.beginPath();
      ctx.arc(p[0], p[1], i === 0 ? 6 : 4, 0, 2 * Math.PI);
      ctx.fillStyle = i === 0 ? '#ffea00' : '#ffffff';
      ctx.fill();
    });
    setStatus(`${currentPts.length} point${currentPts.length !== 1 ? 's' : ''} — double-click or click Finish Zone`);
  } else {
    setStatus('Click on the canvas to start drawing a zone');
  }

  updateZonesList();
}

function setStatus(msg, isError) {
  const el = document.getElementById('zone-status');
  el.textContent = msg;
  el.className = 'mb-0 ' + (isError ? 'text-danger' : '');
}

function updateZonesList() {
  const el = document.getElementById('zones-list');
  const badge = document.getElementById('zone-count-badge');
  if (badge) badge.textContent = zones.length;
  if (!zones.length) {
    el.innerHTML = `<div class="zone-empty-state">
      <div class="zone-empty-icon">&#128506;</div>
      <div class="fw-semibold mb-1">No zones defined yet.</div>
      <div class="small">Click on the canvas to draw your first zone.</div>
    </div>`;
    return;
  }
  el.innerHTML = zones.map((z, i) => {
    const hex = ZONE_COLORS[i % ZONE_COLORS.length];
    const occupancy = z.restricted
      ? (z.max_occupancy != null ? `max: ${z.max_occupancy}` : 'max: 1')
      : (z.max_occupancy != null ? `max: ${z.max_occupancy}` : 'unlimited');
    return `<div class="zone-item" style="border-left-color:${hex};">
      <div class="d-flex align-items-center gap-2" style="min-width:0;">
        <span style="display:inline-block;flex-shrink:0;width:10px;height:10px;background:${hex};border-radius:50%;"></span>
        <span class="zone-name text-truncate">${z.name}</span>
        ${z.restricted ? '<span class="zone-badge restricted ms-1">RESTRICTED</span>' : ''}
        <span class="zone-occ ms-1">${occupancy}</span>
      </div>
      <div class="zone-btns d-flex gap-1 ms-2" style="flex-shrink:0;">
        <button onclick="editZone(${i})" title="Edit">&#9998;</button>
        <button class="del" onclick="deleteZone(${i})" title="Delete">&#10005;</button>
      </div>
    </div>`;
  }).join('');
}

// Canvas events
const zCanvas = document.getElementById('zone-canvas');

zCanvas.addEventListener('click', e => {
  const r = zCanvas.getBoundingClientRect();
  const sx = zCanvas.width / r.width, sy = zCanvas.height / r.height;
  currentPts.push([Math.round((e.clientX - r.left) * sx), Math.round((e.clientY - r.top) * sy)]);
  redraw();
});

zCanvas.addEventListener('dblclick', e => {
  e.preventDefault();
  if (currentPts.length > 0) currentPts.pop(); // undo extra click from dblclick
  finishZone();
});

zCanvas.addEventListener('mousemove', e => {
  const r = zCanvas.getBoundingClientRect();
  mousePos = [(e.clientX - r.left) * (zCanvas.width / r.width),
              (e.clientY - r.top)  * (zCanvas.height / r.height)];
  if (currentPts.length > 0) redraw();
});

zCanvas.addEventListener('mouseleave', () => { mousePos = null; if (currentPts.length > 0) redraw(); });

document.addEventListener('keydown', e => { if (e.key === 'Escape') cancelZone(); });

function finishZone() {
  if (currentPts.length < 3) { setStatus('Need at least 3 points.', true); return; }
  const name = document.getElementById('zone-name').value.trim() || ('Zone ' + (zones.length + 1));
  const restricted = document.getElementById('zone-restricted').checked;
  zones.push({ name, points: [...currentPts], restricted, max_occupancy: restricted ? 1 : 5 });
  zonesModified = true;
  cancelZone();
  saveZones();
}

function cancelZone() {
  currentPts = [];
  document.getElementById('zone-name').value = '';
  document.getElementById('zone-restricted').checked = false;
  redraw();
}

function deleteZone(i) {
  if (!confirm(`Delete zone "${zones[i].name}"?`)) return;
  zones.splice(i, 1);
  zonesModified = true;
  redraw();
  saveZones();
}

let _editModal = null;
function editZone(i) {
  document.getElementById('edit-zone-index').value = i;
  document.getElementById('edit-zone-name').value = zones[i].name;
  document.getElementById('edit-zone-restricted').checked = !!zones[i].restricted;
  if (!_editModal) _editModal = new bootstrap.Modal(document.getElementById('editZoneModal'));
  _editModal.show();
  // Focus name input after modal opens
  document.getElementById('editZoneModal').addEventListener('shown.bs.modal', () => {
    document.getElementById('edit-zone-name').focus();
  }, { once: true });
}

function saveEditZone() {
  const i = parseInt(document.getElementById('edit-zone-index').value, 10);
  const name = document.getElementById('edit-zone-name').value.trim();
  if (!name) { document.getElementById('edit-zone-name').focus(); return; }
  zones[i].name = name;
  zones[i].restricted = document.getElementById('edit-zone-restricted').checked;
  zonesModified = true;
  _editModal.hide();
  redraw();
  saveZones();
}

// Allow saving edit with Enter key in name field
document.getElementById('edit-zone-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveEditZone();
});

function saveZones() {
  return fetch('/api/zones', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(zones),
  }).then(r => r.json()).then(res => {
    zonesModified = false;
    setStatus('Saved ' + res.saved + ' zone' + (res.saved !== 1 ? 's' : '') + ' successfully.');
    updateZonesList();
    refreshFrame();
  }).catch(() => setStatus('Save failed — check the console.', true));
}

// ── CAMERA SELECTOR ────────────────────────────────────────────────────────
let activeCameraIndex = 0;
let zonesModified = false;

function updateCameraChip() {
  const chip = document.getElementById('zone-camera-chip');
  if (!chip) return;
  const label = typeof activeCameraIndex === 'number'
    ? 'Camera ' + activeCameraIndex
    : activeCameraIndex.replace(/^rtsp:\/\//, '').split('/')[0];
  chip.textContent = '\uD83D\uDCF7 ' + label + ' zones';
}

function loadCameras() {
  fetch('/api/cameras').then(r => r.json()).then(cameras => {
    const sel = document.getElementById('camera-select');
    if (!cameras.length) {
      sel.innerHTML = '<option>No cameras found</option>';
      return;
    }
    sel.innerHTML = cameras.map(c => {
      const val = typeof c.index === 'string' ? c.index : c.index;
      const tag = c.type === 'rtsp' ? ' [RTSP]' : '';
      const selected = String(c.index) === String(activeCameraIndex) ? ' selected' : '';
      return `<option value="${val}" data-type="${c.type}"${selected}>${c.label}${tag}</option>`;
    }).join('');
    updateRemoveBtn();
  }).catch(() => {
    document.getElementById('camera-select').innerHTML = '<option>Error loading cameras</option>';
  });
}

function updateRemoveBtn() {
  const sel = document.getElementById('camera-select');
  const opt = sel.options[sel.selectedIndex];
  const btn = document.getElementById('rtsp-remove-btn');
  if (btn) btn.disabled = !(opt && opt.dataset.type === 'rtsp');
}

async function switchCamera() {
  const sel = document.getElementById('camera-select');
  const raw = sel.value;
  // int for USB, string for RTSP
  const source = /^\d+$/.test(raw) ? parseInt(raw, 10) : raw;
  const statusEl = document.getElementById('camera-status');

  if (zonesModified) {
    const save = confirm(
      'You have unsaved zone changes for the current camera.\nSave them before switching?'
    );
    if (save) {
      await saveZones();
    }
  }

  statusEl.style.color = '';
  statusEl.textContent = 'Switching\u2026';
  fetch('/api/camera/switch', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ source }),
  }).then(r => r.json()).then(res => {
    if (res.ok) {
      activeCameraIndex = res.source;
      zonesModified = false;
      updateCameraChip();
      updateRemoveBtn();
      loadZoneEditor();
      statusEl.style.color = '';
      const label = sel.options[sel.selectedIndex].text;
      statusEl.textContent = 'Switched to ' + label;
    } else {
      statusEl.style.color = '#dc3545';
      statusEl.textContent = 'Failed: ' + (res.error || 'unknown error');
    }
  }).catch(() => {
    statusEl.style.color = '#dc3545';
    statusEl.textContent = 'Failed: network error';
  });
}

function toggleRtspForm() {
  const form = document.getElementById('rtsp-form');
  form.style.display = form.style.display === 'none' ? '' : 'none';
}

function addRtspCamera() {
  const name = document.getElementById('rtsp-name').value.trim();
  const url = document.getElementById('rtsp-url').value.trim();
  if (!name || !url) { alert('Name and URL are required'); return; }
  fetch('/api/cameras/rtsp', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, url }),
  }).then(r => r.json()).then(res => {
    if (res.ok) {
      document.getElementById('rtsp-name').value = '';
      document.getElementById('rtsp-url').value = '';
      loadCameras();
    } else {
      alert(res.error || 'Failed to add camera');
    }
  }).catch(() => alert('Network error'));
}

function removeRtspCamera() {
  const sel = document.getElementById('camera-select');
  const opt = sel.options[sel.selectedIndex];
  if (!opt || opt.dataset.type !== 'rtsp') return;
  if (!confirm('Remove RTSP camera "' + opt.text.replace(' [RTSP]', '') + '"?')) return;
  fetch('/api/cameras/rtsp', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url: sel.value }),
  }).then(r => r.json()).then(res => {
    if (res.ok) loadCameras();
    else alert(res.error || 'Failed to remove camera');
  }).catch(() => alert('Network error'));
}

document.getElementById('camera-select').addEventListener('change', updateRemoveBtn);

fetch('/api/camera/current').then(r => r.json()).then(res => {
  activeCameraIndex = res.source;
  updateCameraChip();
  loadCameras();
}).catch(() => loadCameras());
</script>
</body>
</html>
