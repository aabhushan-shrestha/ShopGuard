<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ShopGuard Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    body { background: #12121f; color: #e0e0e0; }
    .navbar-custom { background: #1a1a35; border-bottom: 1px solid #2d2d5e; }
    .nav-tabs { border-bottom-color: #2d2d5e; }
    .nav-tabs .nav-link { color: #9090b0; border-color: transparent; }
    .nav-tabs .nav-link:hover { color: #fff; border-color: transparent; }
    .nav-tabs .nav-link.active { background: #1e1e40; color: #fff; border-color: #2d2d5e #2d2d5e #1e1e40; }
    .card-dark { background: #1a1a35; border: 1px solid #2d2d5e; border-radius: 8px; padding: 1rem; }
    .table { color: #e0e0e0; }
    .table-dark { --bs-table-bg: #12121f; --bs-table-striped-bg: #1a1a35; }
    .clip-item { background: #1a1a35; border: 1px solid #2d2d5e; border-radius: 6px;
                 padding: 8px 12px; margin-bottom: 6px; cursor: pointer; transition: background 0.15s; }
    .clip-item:hover { background: #252550; }
    .clip-item.active { border-color: #4d79ff; }
    #zone-canvas { cursor: crosshair; border: 2px solid #2d2d5e; border-radius: 4px;
                   display: block; max-width: 100%; }
    .zone-item { background: #1e1e40; border-radius: 4px; padding: 6px 10px;
                 margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center;
                 border-left: 3px solid transparent; }
    .zone-empty-state { background: #1e1e40; border: 2px dashed #2d2d5e; border-radius: 8px;
                        padding: 2rem 1rem; text-align: center; color: #9090b0; }
    .zone-empty-state .zone-empty-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .point-counter { display: inline-block; background: #1e1e40; border: 1px solid #2d2d5e;
                     border-radius: 4px; padding: 2px 10px; font-size: 0.78rem; color: #9090b0; margin-top: 6px; }
    .modal-dark .modal-content { background: #1a1a35; border: 1px solid #2d2d5e; color: #e0e0e0; }
    .modal-dark .modal-header { border-bottom-color: #2d2d5e; }
    .modal-dark .modal-footer { border-top-color: #2d2d5e; }
    .modal-dark .btn-close { filter: invert(1) grayscale(1); }
    .badge-info    { background-color: #0d6efd !important; }
    .badge-warning { background-color: #ffc107 !important; color: #000 !important; }
    .badge-critical { background-color: #dc3545 !important; }
    input.bg-dark, select.bg-dark { background-color: #1a1a35 !important; color: #e0e0e0 !important; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #12121f; }
    ::-webkit-scrollbar-thumb { background: #2d2d5e; border-radius: 3px; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark navbar-custom px-3 mb-0">
  <span class="navbar-brand fw-bold fs-5">&#128737; ShopGuard</span>
  <span class="text-muted small">Retail Security Dashboard</span>
</nav>

<div class="container-fluid px-3 pt-3">

  <ul class="nav nav-tabs mb-3" id="mainTabs">
    <li class="nav-item"><button class="nav-link active" data-tab="live">&#128249; Live</button></li>
    <li class="nav-item"><button class="nav-link" data-tab="alerts">&#128680; Alerts</button></li>
    <li class="nav-item"><button class="nav-link" data-tab="clips">&#127916; Clips</button></li>
    <li class="nav-item"><button class="nav-link" data-tab="zones">&#128506; Zones</button></li>
  </ul>

  <!-- ── LIVE ────────────────────────────────────────────────────────── -->
  <div id="tab-live" class="tab-pane">
    <div class="text-center">
      <img src="/video_feed" class="img-fluid rounded" style="max-height:82vh; border:2px solid #2d2d5e;" alt="Live feed">
      <div id="camera-bar" class="d-flex align-items-center justify-content-center gap-2 mt-2">
        <span class="text-muted small">Camera:</span>
        <select id="camera-select" class="form-select form-select-sm bg-dark border-secondary text-light" style="width:auto;">
          <option>Loading...</option>
        </select>
        <button class="btn btn-sm btn-outline-primary" onclick="switchCamera()">Connect</button>
        <span id="camera-status" class="text-muted small"></span>
      </div>
    </div>
  </div>

  <!-- ── ALERTS ──────────────────────────────────────────────────────── -->
  <div id="tab-alerts" class="tab-pane d-none">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h6 class="mb-0 text-muted">Recent Alerts <span id="alert-count" class="badge bg-secondary ms-1">0</span></h6>
      <button class="btn btn-sm btn-outline-secondary" onclick="loadAlerts()">&#8635; Refresh</button>
    </div>
    <div class="table-responsive">
      <table class="table table-sm table-dark table-striped align-middle">
        <thead class="text-muted">
          <tr><th>Time</th><th>Level</th><th>Type</th><th>Message</th><th>Zone</th><th>Person</th></tr>
        </thead>
        <tbody id="alerts-body">
          <tr><td colspan="6" class="text-center text-muted py-3">Loading&hellip;</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ── CLIPS ───────────────────────────────────────────────────────── -->
  <div id="tab-clips" class="tab-pane d-none">
    <div class="row g-3">
      <div class="col-md-3">
        <h6 class="text-muted mb-2">Saved Clips</h6>
        <div id="clips-list" style="max-height:80vh; overflow-y:auto;"></div>
      </div>
      <div class="col-md-9">
        <div id="clip-viewer" class="d-none">
          <video id="clip-player" controls class="w-100 rounded mb-2" style="max-height:60vh; background:#000;"></video>
          <img id="clip-snapshot" class="img-fluid rounded d-none" style="max-height:40vh;" alt="Snapshot">
        </div>
        <div id="clips-empty" class="text-muted text-center mt-5">
          <p>Select a clip to play</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ── ZONES ───────────────────────────────────────────────────────── -->
  <div id="tab-zones" class="tab-pane d-none">
    <div class="row g-3">
      <div class="col-md-8">
        <p class="text-muted small mb-1">
          Click to place points &nbsp;&#8226;&nbsp; Double-click to finish zone &nbsp;&#8226;&nbsp; Esc to cancel
        </p>
        <canvas id="zone-canvas"></canvas>
        <div>
          <button class="btn btn-sm btn-outline-secondary mt-2 me-2" onclick="refreshFrame()">&#8635; Refresh Frame</button>
          <span id="point-counter" class="point-counter">Points placed: 0</span>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card-dark mb-3">
          <h6 class="mb-3 fw-bold" style="color:#e0e0e0;">New Zone</h6>
          <label class="form-label small fw-semibold" style="color:#c0c0d0;">Zone Name</label>
          <input id="zone-name" class="form-control form-control-sm bg-dark border-secondary text-light mb-2" placeholder="e.g. exit, cashier">
          <div class="form-check mb-2 d-flex align-items-center gap-2">
            <input class="form-check-input" type="checkbox" id="zone-restricted" style="width:1.1em;height:1.1em;">
            <label class="form-check-label fw-semibold" for="zone-restricted" style="color:#e0e0e0;">Restricted <span class="text-muted fw-normal">(alerts on entry)</span></label>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-sm btn-primary" onclick="finishZone()">&#10003; Finish Zone</button>
            <button class="btn btn-sm btn-outline-secondary" onclick="cancelZone()">&#10005; Cancel</button>
          </div>
          <p id="zone-status" class="text-muted small mt-2 mb-0"></p>
        </div>
        <div class="card-dark">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="mb-0 fw-bold" style="color:#e0e0e0;">
              Defined Zones <span id="zone-count-badge" class="badge bg-primary ms-1">0</span>
            </h6>
            <button class="btn btn-sm btn-success" onclick="saveZones()">&#128190; Save All</button>
          </div>
          <div id="zones-list"></div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /container -->

<!-- ── ZONE EDIT MODAL ──────────────────────────────────────────────────── -->
<div class="modal fade modal-dark" id="editZoneModal" tabindex="-1" aria-labelledby="editZoneModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header py-2">
        <h6 class="modal-title mb-0" id="editZoneModalLabel">Edit Zone</h6>
        <button type="button" class="btn-close btn-sm" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-zone-index">
        <label class="form-label text-muted small mb-1">Zone Name</label>
        <input id="edit-zone-name" class="form-control form-control-sm bg-dark border-secondary text-light mb-3" placeholder="Zone name">
        <div class="form-check mb-1">
          <input class="form-check-input" type="checkbox" id="edit-zone-restricted">
          <label class="form-check-label text-muted small" for="edit-zone-restricted">Restricted (alerts on entry)</label>
        </div>
      </div>
      <div class="modal-footer py-2">
        <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-sm btn-primary" onclick="saveEditZone()">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── TAB SWITCHING ──────────────────────────────────────────────────────────
document.querySelectorAll('[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('d-none'));
    document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + btn.dataset.tab).classList.remove('d-none');
    btn.classList.add('active');
    if (btn.dataset.tab === 'alerts') loadAlerts();
    if (btn.dataset.tab === 'clips')  loadClips();
    if (btn.dataset.tab === 'zones')  loadZoneEditor();
    if (btn.dataset.tab === 'live')   loadCameras();
  });
});

// ── ALERTS ─────────────────────────────────────────────────────────────────
function loadAlerts() {
  fetch('/api/alerts').then(r => r.json()).then(alerts => {
    document.getElementById('alert-count').textContent = alerts.length;
    const tbody = document.getElementById('alerts-body');
    if (!alerts.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3">No alerts yet</td></tr>';
      return;
    }
    const levelBadge = l => ({critical:'danger', warning:'warning', info:'info'}[l] || 'secondary');
    tbody.innerHTML = alerts.map(a => {
      const t = new Date(a.timestamp * 1000).toLocaleTimeString();
      return `<tr>
        <td class="text-nowrap">${t}</td>
        <td><span class="badge badge-${a.level} bg-${levelBadge(a.level)}">${a.level.toUpperCase()}</span></td>
        <td>${a.alert_type}</td>
        <td>${a.message}</td>
        <td>${a.zone_name || '<span class="text-muted">—</span>'}</td>
        <td>${a.person_id !== null && a.person_id !== undefined ? a.person_id : '<span class="text-muted">—</span>'}</td>
      </tr>`;
    }).join('');
  }).catch(() => {});
}
setInterval(() => {
  if (!document.getElementById('tab-alerts').classList.contains('d-none')) loadAlerts();
}, 5000);

// ── CLIPS ──────────────────────────────────────────────────────────────────
function loadClips() {
  fetch('/api/clips').then(r => r.json()).then(clips => {
    const el = document.getElementById('clips-list');
    if (!clips.length) {
      el.innerHTML = '<p class="text-muted small">No clips saved yet.</p>';
      return;
    }
    el.innerHTML = clips.map(c => {
      const parts = c.stem.split('_');
      const date = parts[0] || '';
      const timeStr = parts[1] || '';
      const type = parts.slice(2).join('_') || '';
      const label = `${date.slice(0,4)}-${date.slice(4,6)}-${date.slice(6,8)} ${timeStr.slice(0,2)}:${timeStr.slice(2,4)}:${timeStr.slice(4,6)}`;
      return `<div class="clip-item" id="clip-${c.stem}" onclick="playClip('${c.name}','${c.stem}',${c.has_snapshot})">
        <div class="small fw-bold text-truncate">${label}</div>
        <div class="text-muted" style="font-size:0.75rem">${type}</div>
      </div>`;
    }).join('');
  }).catch(() => {});
}

function playClip(name, stem, hasSnapshot) {
  document.querySelectorAll('.clip-item').forEach(e => e.classList.remove('active'));
  const item = document.getElementById('clip-' + stem);
  if (item) item.classList.add('active');

  const player = document.getElementById('clip-player');
  const snap   = document.getElementById('clip-snapshot');
  const viewer = document.getElementById('clip-viewer');
  const empty  = document.getElementById('clips-empty');

  viewer.classList.remove('d-none');
  empty.classList.add('d-none');
  player.src = '/clips/' + name;
  player.play().catch(() => {});

  if (hasSnapshot) {
    snap.src = '/clips/' + stem + '_snapshot.jpg';
    snap.classList.remove('d-none');
  } else {
    snap.classList.add('d-none');
  }
}

// ── ZONE EDITOR ────────────────────────────────────────────────────────────
let zones = [];
let currentPts = [];
let mousePos = null;
const ZONE_COLORS = ['#00e5ff','#ff1744','#00e676','#ffea00','#ff6d00','#d500f9'];

function loadZoneEditor() {
  refreshFrame();
  fetch('/api/zones').then(r => r.json()).then(data => {
    zones = data || [];
    updateZonesList();
  }).catch(() => {});
}

function refreshFrame() {
  const canvas = document.getElementById('zone-canvas');
  const img = new Image();
  img.onload = () => {
    canvas.width  = img.naturalWidth;
    canvas.height = img.naturalHeight;
    canvas._bg = img;
    fetch('/api/zones').then(r => r.json()).then(data => {
      zones = data || [];
      redraw();
    }).catch(() => { zones = []; redraw(); });
  };
  img.onerror = () => setStatus('Could not load frame — is detection running?', true);
  img.src = '/api/frame?' + Date.now();
}

function redraw() {
  const canvas = document.getElementById('zone-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (canvas._bg) ctx.drawImage(canvas._bg, 0, 0);

  // Draw saved zones
  zones.forEach((z, i) => {
    if (!z.points || z.points.length < 2) return;
    const hex = ZONE_COLORS[i % ZONE_COLORS.length];
    ctx.beginPath();
    ctx.moveTo(z.points[0][0], z.points[0][1]);
    z.points.slice(1).forEach(p => ctx.lineTo(p[0], p[1]));
    ctx.closePath();
    ctx.fillStyle = hex + '40';   // 25% opacity fill
    ctx.fill();
    ctx.strokeStyle = hex;
    ctx.lineWidth = 2;
    ctx.stroke();
    // Label at centroid
    const cx = z.points.reduce((s, p) => s + p[0], 0) / z.points.length;
    const cy = z.points.reduce((s, p) => s + p[1], 0) / z.points.length;
    ctx.font = 'bold 13px sans-serif';
    ctx.fillStyle = '#000';
    ctx.fillText((z.restricted ? '\uD83D\uDD12 ' : '') + z.name, cx - 20 + 1, cy + 1);
    ctx.fillStyle = '#fff';
    ctx.fillText((z.restricted ? '\uD83D\uDD12 ' : '') + z.name, cx - 20, cy);
  });

  // Draw in-progress polygon
  const counter = document.getElementById('point-counter');
  if (counter) counter.textContent = 'Points placed: ' + currentPts.length;

  if (currentPts.length > 0) {
    const pts = mousePos ? [...currentPts, mousePos] : currentPts;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 4]);
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    pts.slice(1).forEach(p => ctx.lineTo(p[0], p[1]));
    ctx.stroke();
    ctx.setLineDash([]);
    currentPts.forEach((p, i) => {
      ctx.beginPath();
      ctx.arc(p[0], p[1], i === 0 ? 6 : 4, 0, 2 * Math.PI);
      ctx.fillStyle = i === 0 ? '#ffea00' : '#ffffff';
      ctx.fill();
    });
    setStatus(`${currentPts.length} point${currentPts.length !== 1 ? 's' : ''} — double-click or click Finish Zone`);
  } else {
    setStatus('Click on the canvas to start drawing a zone');
  }

  updateZonesList();
}

function setStatus(msg, isError) {
  const el = document.getElementById('zone-status');
  el.textContent = msg;
  el.className = 'small mt-2 mb-0 ' + (isError ? 'text-danger' : 'text-muted');
}

function updateZonesList() {
  const el = document.getElementById('zones-list');
  const badge = document.getElementById('zone-count-badge');
  if (badge) badge.textContent = zones.length;
  if (!zones.length) {
    el.innerHTML = `<div class="zone-empty-state">
      <div class="zone-empty-icon">&#128506;</div>
      <div class="fw-semibold mb-1">No zones defined yet.</div>
      <div class="small">Click on the canvas to draw your first zone.</div>
    </div>`;
    return;
  }
  el.innerHTML = zones.map((z, i) => {
    const hex = ZONE_COLORS[i % ZONE_COLORS.length];
    const occupancy = z.restricted
      ? (z.max_occupancy != null ? `max: ${z.max_occupancy}` : 'max: 1')
      : (z.max_occupancy != null ? `max: ${z.max_occupancy}` : 'unlimited');
    return `<div class="zone-item" style="border-left-color:${hex};">
      <div class="d-flex align-items-center gap-2" style="min-width:0;">
        <span style="display:inline-block;flex-shrink:0;width:10px;height:10px;background:${hex};border-radius:50%;"></span>
        <span class="small fw-semibold text-truncate" style="color:#e0e0e0;">${z.name}</span>
        ${z.restricted ? '<span class="badge bg-danger ms-1" style="font-size:0.65rem;">RESTRICTED</span>' : ''}
        <span class="text-muted ms-1" style="font-size:0.7rem;">${occupancy}</span>
      </div>
      <div class="d-flex gap-1 ms-2" style="flex-shrink:0;">
        <button class="btn btn-sm btn-outline-secondary py-0 px-2" onclick="editZone(${i})" style="font-size:0.7rem" title="Edit">&#9998;</button>
        <button class="btn btn-sm btn-outline-danger py-0 px-2" onclick="deleteZone(${i})" style="font-size:0.7rem" title="Delete">&#10005;</button>
      </div>
    </div>`;
  }).join('');
}

// Canvas events
const zCanvas = document.getElementById('zone-canvas');

zCanvas.addEventListener('click', e => {
  const r = zCanvas.getBoundingClientRect();
  const sx = zCanvas.width / r.width, sy = zCanvas.height / r.height;
  currentPts.push([Math.round((e.clientX - r.left) * sx), Math.round((e.clientY - r.top) * sy)]);
  redraw();
});

zCanvas.addEventListener('dblclick', e => {
  e.preventDefault();
  if (currentPts.length > 0) currentPts.pop(); // undo extra click from dblclick
  finishZone();
});

zCanvas.addEventListener('mousemove', e => {
  const r = zCanvas.getBoundingClientRect();
  mousePos = [(e.clientX - r.left) * (zCanvas.width / r.width),
              (e.clientY - r.top)  * (zCanvas.height / r.height)];
  if (currentPts.length > 0) redraw();
});

zCanvas.addEventListener('mouseleave', () => { mousePos = null; if (currentPts.length > 0) redraw(); });

document.addEventListener('keydown', e => { if (e.key === 'Escape') cancelZone(); });

function finishZone() {
  if (currentPts.length < 3) { setStatus('Need at least 3 points.', true); return; }
  const name = document.getElementById('zone-name').value.trim() || ('Zone ' + (zones.length + 1));
  const restricted = document.getElementById('zone-restricted').checked;
  zones.push({ name, points: [...currentPts], restricted, max_occupancy: restricted ? 1 : 5 });
  cancelZone();
  saveZones();
}

function cancelZone() {
  currentPts = [];
  document.getElementById('zone-name').value = '';
  document.getElementById('zone-restricted').checked = false;
  redraw();
}

function deleteZone(i) {
  if (!confirm(`Delete zone "${zones[i].name}"?`)) return;
  zones.splice(i, 1);
  redraw();
  saveZones();
}

let _editModal = null;
function editZone(i) {
  document.getElementById('edit-zone-index').value = i;
  document.getElementById('edit-zone-name').value = zones[i].name;
  document.getElementById('edit-zone-restricted').checked = !!zones[i].restricted;
  if (!_editModal) _editModal = new bootstrap.Modal(document.getElementById('editZoneModal'));
  _editModal.show();
  // Focus name input after modal opens
  document.getElementById('editZoneModal').addEventListener('shown.bs.modal', () => {
    document.getElementById('edit-zone-name').focus();
  }, { once: true });
}

function saveEditZone() {
  const i = parseInt(document.getElementById('edit-zone-index').value, 10);
  const name = document.getElementById('edit-zone-name').value.trim();
  if (!name) { document.getElementById('edit-zone-name').focus(); return; }
  zones[i].name = name;
  zones[i].restricted = document.getElementById('edit-zone-restricted').checked;
  _editModal.hide();
  redraw();
  saveZones();
}

// Allow saving edit with Enter key in name field
document.getElementById('edit-zone-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveEditZone();
});

function saveZones() {
  fetch('/api/zones', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(zones),
  }).then(r => r.json()).then(res => {
    setStatus('Saved ' + res.saved + ' zone' + (res.saved !== 1 ? 's' : '') + ' successfully.');
    updateZonesList();
    refreshFrame();
  }).catch(() => setStatus('Save failed — check the console.', true));
}

// ── CAMERA SELECTOR ────────────────────────────────────────────────────────
let activeCameraIndex = 0;

function loadCameras() {
  fetch('/api/cameras').then(r => r.json()).then(cameras => {
    const sel = document.getElementById('camera-select');
    if (!cameras.length) {
      sel.innerHTML = '<option>No cameras found</option>';
      return;
    }
    sel.innerHTML = cameras.map(c =>
      `<option value="${c.index}"${c.index === activeCameraIndex ? ' selected' : ''}>${c.label}</option>`
    ).join('');
  }).catch(() => {
    document.getElementById('camera-select').innerHTML = '<option>Error loading cameras</option>';
  });
}

function switchCamera() {
  const sel = document.getElementById('camera-select');
  const source = parseInt(sel.value, 10);
  const label = sel.options[sel.selectedIndex].text;
  const statusEl = document.getElementById('camera-status');
  statusEl.style.color = '';
  statusEl.textContent = 'Switching\u2026';
  fetch('/api/camera/switch', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ source }),
  }).then(r => r.json()).then(res => {
    if (res.ok) {
      activeCameraIndex = source;
      statusEl.style.color = '';
      statusEl.textContent = 'Switched to ' + label;
    } else {
      statusEl.style.color = '#dc3545';
      statusEl.textContent = 'Failed: ' + (res.error || 'unknown error');
    }
  }).catch(() => {
    statusEl.style.color = '#dc3545';
    statusEl.textContent = 'Failed: network error';
  });
}

loadCameras();
</script>
</body>
</html>
